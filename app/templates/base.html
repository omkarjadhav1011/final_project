<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MockMinds — AI Interview Prep{% endblock %}</title>

    <!-- Fonts: Syne (display) + Plus Jakarta Sans (body) + DM Mono (code) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Tailwind (retained for compatibility with dashboard / auth pages) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'primary-red':          '#dc2626',
                        'secondary-yellow':     '#fbbf24',
                        'primary-yellow':       '#f59e0b',
                        'bg-dark':              '#0f172a',
                        'bg-dark-card':         '#1e293b',
                        'bg-dark-elevated':     '#334155',
                        'text-primary':         '#f8fafc',
                        'text-secondary':       '#cbd5e1',
                        'text-tertiary':        '#94a3b8'
                    }
                }
            }
        }
    </script>

    <!-- Styles -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v=1.0.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/pages.css') }}?v=1.0.0">

    <meta name="description" content="Prepare for technical interviews with AI-powered insights and real-time feedback">
    <meta name="theme-color" content="#00d4b8">

    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%2300d4b8'/%3E%3Cpath d='M10 22 L16 10 L22 22 M12.5 18 L19.5 18' stroke='%23000' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round' fill='none'/%3E%3C/svg%3E">
</head>

<body>

    <!-- ─── Top Navigation Bar ─── -->
    <header class="app-header">
        <div class="app-header__inner">

            <!-- Brand -->
            <a href="/" class="app-brand">
                <span class="app-brand__mark">M</span>
                <span class="app-brand__name">MockMinds</span>
            </a>

            <!-- Nav Links -->
            <nav class="app-nav">
                <a href="/" class="app-nav__link">Dashboard</a>
                <a href="/upload" class="app-nav__link">Practice</a>
                <a href="/interview" class="app-nav__link">History</a>
                <a href="/settings" class="app-nav__link">Settings</a>
            </nav>

            <!-- Profile -->
            <div class="app-header__actions">
                <div class="profile-dropdown">
                    <button type="button" id="profileDropdownBtn" class="avatar-btn" aria-label="Profile menu">
                        <span class="avatar-btn__letter">{{ current_user.username[0] | upper }}</span>
                    </button>
                    <div id="profileDropdown" class="dropdown-panel hidden">
                        <div class="dropdown-user">
                            <div class="dropdown-user__name">{{ current_user.username }}</div>
                            <div class="dropdown-user__email">{{ current_user.email }}</div>
                        </div>
                        <a href="/profile" class="dropdown-item">
                            <i class="fas fa-user"></i>Profile
                        </a>
                        <a href="/settings" class="dropdown-item">
                            <i class="fas fa-cog"></i>Settings
                        </a>
                        <a href="{{ url_for('auth.logout') }}" class="dropdown-item dropdown-item--danger">
                            <i class="fas fa-sign-out-alt"></i>Logout
                        </a>
                    </div>
                </div>
            </div>

        </div>
    </header>

    <!-- ─── Page Content ─── -->
    <main class="app-main">
        {% block content %}{% endblock %}
    </main>

    <!-- ─── Footer ─── -->
    <footer class="app-footer">
        <div class="app-footer__inner">
            <div class="app-footer__brand">
                <span class="app-brand__mark sm">M</span>
                <span class="app-footer__tagline">MockMinds &mdash; Built to make you interview-ready.</span>
            </div>
            <nav class="app-footer__links">
                <a href="#">Privacy</a>
                <a href="#">Terms</a>
                <a href="#">About</a>
            </nav>
        </div>
    </footer>

    <!-- Main JS -->
    <script type="module" src="{{ url_for('static', filename='js/main.js') }}"></script>

    <!-- Profile Dropdown -->
    <script>
        (function () {
            const btn = document.getElementById('profileDropdownBtn');
            const panel = document.getElementById('profileDropdown');
            if (!btn || !panel) return;

            btn.addEventListener('click', function (e) {
                e.stopPropagation();
                panel.classList.toggle('hidden');
            });
            document.addEventListener('click', function (e) {
                if (!panel.contains(e.target) && !btn.contains(e.target)) {
                    panel.classList.add('hidden');
                }
            });
            document.addEventListener('keydown', function (e) {
                if (e.key === 'Escape') panel.classList.add('hidden');
            });
        })();
    </script>

    {% block scripts %}{% endblock %}

</body>
</html>
